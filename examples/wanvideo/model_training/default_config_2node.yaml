compute_environment: SLURM
debug: false

# Use PyTorch DDP via Accelerate (no DeepSpeed)
distributed_type: MULTI_MACHINE

downcast_bf16: 'no'
enable_cpu_affinity: false

# Multi-node settings
num_machines: 2
num_processes: 8          # processes PER machine (8 GPUs per node)
machine_rank: 0           # overridden by --machine_rank $SLURM_NODEID

# Rendezvous / master
rdzv_backend: static
same_network: true
main_process_ip: "REPLACE_WITH_MASTER_HOSTNAME_OR_IP"
main_process_port: 29600

main_training_function: main
use_cpu: false

tpu_env: []
tpu_use_cluster: false
tpu_use_sudo: false